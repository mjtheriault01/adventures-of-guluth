<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Adventures of Guluth</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--brown-dark);
      background: radial-gradient(ellipse at center, #5e2a08 0%, #1a0900 100%);
    }

    .gate-box {
      background: var(--cream);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .gate-spot {
      width: 28px;
      height: 28px;
      background: var(--purple);
      border-radius: 50%;
      margin: 0 auto 20px;
    }

    .gate-box h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      color: var(--brown-dark);
      margin-bottom: 6px;
    }

    .gate-box p {
      font-size: 0.9rem;
      color: var(--brown-mid);
      margin-bottom: 28px;
    }

    .gate-input {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      font-family: 'Lato', sans-serif;
      border: 2px solid var(--parchment);
      border-radius: 10px;
      background: var(--cream);
      color: var(--brown-dark);
      outline: none;
      text-align: center;
      letter-spacing: 0.08em;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }

    .gate-input:focus {
      border-color: var(--purple);
    }

    .gate-btn {
      width: 100%;
      padding: 13px;
      background: var(--purple);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }

    .gate-btn:hover {
      background: #5e3680;
    }

    .gate-error {
      display: none;
      margin-top: 14px;
      color: #b03a2e;
      font-size: 0.88rem;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <div class="gate-box">
    <div class="gate-spot"></div>
    <h1>The Adventures of Guluth</h1>
    <p>Enter the secret code to continue.</p>
    <input
      class="gate-input"
      type="password"
      id="codeInput"
      placeholder="Secret code"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    />
    <button class="gate-btn" id="enterBtn">Enter</button>
    <p class="gate-error" id="gateError"></p>
  </div>

  <script src="js/auth.js"></script>
  <script>
    const input = document.getElementById('codeInput');
    const btn = document.getElementById('enterBtn');
    const err = document.getElementById('gateError');

    btn.addEventListener('click', () => attemptLogin(input.value, err));
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') attemptLogin(input.value, err);
    });
  </script>

</body>
</html>
